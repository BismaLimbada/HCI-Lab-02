<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Safe Syringe Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="calculator">
    <div class="header">
        <h2>Syringe Controller</h2>
        <span class="status-badge">System Active</span>
    </div>
    
    <p class="instruction">Adjust dosage digit by digit</p>
    
    <div class="digit-group">
        <div class="column">
            <button class="step" onclick="change(0, 1)">+</button>
            <div id="d0" class="digit">0</div>
            <button class="step" onclick="change(0, -1)">−</button>
        </div>
        <div class="column">
            <button class="step" onclick="change(1, 1)">+</button>
            <div id="d1" class="digit">0</div>
            <button class="step" onclick="change(1, -1)">−</button>
        </div>
        <div class="column">
            <button class="step" onclick="change(2, 1)">+</button>
            <div id="d2" class="digit">0</div>
            <button class="step" onclick="change(2, -1)">−</button>
        </div>
        <div class="column">
            <button class="step" onclick="change(3, 1)">+</button>
            <div id="d3" class="digit">0</div>
            <button class="step" onclick="change(3, -1)">−</button>
        </div>
    </div>

    <div class="total-box">
        <label>Total Dose (mg)</label>
        <div id="total">0000</div>
    </div>
    
    <button class="confirm-btn" onclick="confirmDose()">Confirm Injection</button>
</div>

<script>
    let digits = [0, 0, 0, 0];
    function change(idx, val) {
        digits[idx] = (digits[idx] + val + 10) % 10;
        document.getElementById('d' + idx).innerText = digits[idx];
        document.getElementById('total').innerText = digits.join('');
    }
    function confirmDose() {
        alert("Verify: Injecting " + digits.join('') + " mg?");
    }
</script>

</body>
</html>
