<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Syringe Controller</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <h1>Precision Dose Controller</h1>
        <p>HCI Safety-Critical Interface</p>
    </div>

    <div class="control-card">
        <h3>Adjust Concentration</h3>
        <div class="digit-row">
            <div class="digit-module">
                <button class="adj-btn plus" onclick="change(0, 1)">+</button>
                <div id="d0" class="digit-val">0</div>
                <button class="adj-btn minus" onclick="change(0, -1)">−</button>
            </div>
            <div class="digit-module">
                <button class="adj-btn plus" onclick="change(1, 1)">+</button>
                <div id="d1" class="digit-val">0</div>
                <button class="adj-btn minus" onclick="change(1, -1)">−</button>
            </div>
            <div class="digit-module">
                <button class="adj-btn plus" onclick="change(2, 1)">+</button>
                <div id="d2" class="digit-val">0</div>
                <button class="adj-btn minus" onclick="change(2, -1)">−</button>
            </div>
            <div class="digit-module">
                <button class="adj-btn plus" onclick="change(3, 1)">+</button>
                <div id="d3" class="digit-val">0</div>
                <button class="adj-btn minus" onclick="change(3, -1)">−</button>
            </div>
        </div>
    </div>

    <div class="summary-card">
        <span class="label">FINAL CALCULATED DOSE</span>
        <div class="dose-display">
            <span id="total">0000</span> <small>mg</small>
        </div>
    </div>

    <div class="action-card">
        <button class="confirm-btn" onclick="confirmDose()">
            CONFIRM & INJECT
        </button>
    </div>
</div>

<script>
    let digits = [0, 0, 0, 0];
    function change(idx, val) {
        digits[idx] = (digits[idx] + val + 10) % 10;
        document.getElementById('d' + idx).innerText = digits[idx];
        document.getElementById('total').innerText = digits.join('');
    }
    function confirmDose() {
        alert("CRITICAL AUTHORIZATION REQUIRED: Inject " + digits.join('') + "mg now?");
    }
</script>

</body>
</html>
