<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syringe Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>Automated Syringe</h1>
        <p>Dose Calculator</p>
    </div>

    <div class="content">
        <div class="digit-row">
            <div class="digit-group">
                <button class="btn" onclick="change(0, 1)">+</button>
                <div id="d0" class="number">0</div>
                <button class="btn" onclick="change(0, -1)">-</button>
            </div>
            
            <div class="digit-group">
                <button class="btn" onclick="change(1, 1)">+</button>
                <div id="d1" class="number">0</div>
                <button class="btn" onclick="change(1, -1)">-</button>
            </div>

            <div class="digit-group">
                <button class="btn" onclick="change(2, 1)">+</button>
                <div id="d2" class="number">0</div>
                <button class="btn" onclick="change(2, -1)">-</button>
            </div>

            <div class="digit-group">
                <button class="btn" onclick="change(3, 1)">+</button>
                <div id="d3" class="number">0</div>
                <button class="btn" onclick="change(3, -1)">-</button>
            </div>
        </div>

        <div class="display-area">
            <label>TOTAL DOSE</label>
            <div class="total-text"><span id="total">0000</span> mg</div>
        </div>

        <button class="inject-btn" onclick="confirmDose()">CONFIRM INJECTION</button>
    </div>
</div>

<script>
    let values = [0, 0, 0, 0];

    function change(index, amount) {
        values[index] = (values[index] + amount + 10) % 10;
        document.getElementById('d' + index).innerText = values[index];
        document.getElementById('total').innerText = values.join('');
    }

    function confirmDose() {
        alert("Injection sequence for " + values.join('') + "mg authorized.");
    }
</script>

</body>
</html>
